<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OOP JavaScript</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body class="bg-secondary">
    <h1 class="text-center">PET's FORM</h1>
    <main>
      <form id="form" class="container w-50 mx-auto text-center">
        <div class="form-floating mb-3">
          <input
            type="text"
            class="form-control"
            id="petName"
            placeholder="Type your pet's name"
            required
          />
          <label for="petName">Pet Name</label>
        </div>
        <div class="form-floating mb-3">
          <input
            type="text"
            class="form-control"
            id="ownerName"
            placeholder="Type your name"
            required
          />
          <label for="ownerName">Owner Name</label>
        </div>
        <div class="form-floating mb-3">
          <input
            type="text"
            class="form-control"
            id="species"
            placeholder="Type your pet's specie"
            required
          />
          <label for="species">Pet Specie</label>
        </div>
        <div class="form-floating">
          <input
            type="text"
            class="form-control"
            id="breed"
            placeholder="Type your pet's breed"
            required
          />
          <label for="breed">Pet's Breed</label>
        </div>
        <button type="submit" class="btn btn-success mt-5">INVIA</button>
      </form>
    </main>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="/script.js"></script>
  </body>
</html>
